name: release

# Tag-driven release. Push a tag like `v1.2.3` and this builds, signs, and
# publishes per-platform artifacts to one GitHub Release:
#   * macOS   → Gatekeeper-clean DMG (signed + notarized)
#   * Windows → Inno Setup installer (.agl association) + portable ZIP
#   * Linux   → AppImage (x86_64)
# Version flows: git tag → AGLAIA_VERSION → Aglaia.spec → artifact names.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   --- macOS (build job) ---
#   APPLE_CERT_P12_BASE64        Developer ID Application cert+key, exported
#                                as .p12 then `base64 -i cert.p12 | pbcopy`.
#   APPLE_CERT_PASSWORD          Password set when exporting the .p12.
#   APPLE_SIGN_IDENTITY          e.g. "Developer ID Application: Name (TEAMID)".
#   APPLE_ID                     Apple ID email used for notarization.
#   APPLE_TEAM_ID                10-char Apple Developer Team ID.
#   APPLE_APP_SPECIFIC_PASSWORD  App-specific password (appleid.apple.com).
#   --- Windows (build-windows job, OPTIONAL — unsigned ZIP ships without) ---
#   WINDOWS_CERT_PFX_BASE64      Authenticode cert+key (.pfx) base64-encoded.
#   WINDOWS_CERT_PASSWORD        Password for the .pfx.
# See docs/distribution.md for the full setup walkthrough.

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # create the GitHub Release + upload assets

jobs:
  build:
    runs-on: macos-14   # Apple Silicon (arm64) — tier-1 target
    env:
      AGLAIA_NOTARY_PROFILE: aglaia-notary
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Vendor llama-server (Surya backend)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # lift anonymous API rate limit
        run: uv run --no-project python scripts/fetch_llama_server.py --platform macos-arm64

      - name: Sync deps (everything but cuda — the shipped app must be full-featured)
        # MUST include `gui` (PySide6) or the bundled .app crashes on launch with
        # ModuleNotFoundError: No module named 'PySide6'. Ship every extra except
        # `cuda` (Linux-GPU JAX wheels, irrelevant on the macOS arm64 target).
        # surya + paddle are the OCR engines (now extras, not base deps). They
        # have conflicting huggingface-hub pins; `uv sync` reconciles them via
        # [tool.uv] override-dependencies (a loose pip install can't — hence
        # the split). Both ship in the .app so all OCR backends are available.
        run: >-
          uv sync --extra gui --extra voice --extra macos --extra dev --extra package
          --extra jbig2 --extra cloud --extra keyring-bitwarden --extra keyring-1password
          --extra surya --extra paddle

      - name: Tests (release gate)
        run: uv run pytest -q

      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KP="$(openssl rand -base64 24)"
          echo "KEYCHAIN_PW=$KP" >> "$GITHUB_ENV"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KP" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PW: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "$AGLAIA_NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PW"

      - name: Build .app (PyInstaller, unsigned)
        # No AGLAIA_SIGN_IDENTITY on purpose: PyInstaller signs each bundled
        # dylib inline with --timestamp, bursting Apple's TSA and randomly
        # failing ("A timestamp was expected but was not found"). Signing is
        # deferred to the next step, which signs once with retry/backoff.
        env:
          AGLAIA_VERSION: ${{ steps.ver.outputs.version }}
        run: uv run pyinstaller Aglaia.spec --clean --noconfirm

      - name: Re-sign + notarize + staple
        env:
          AGLAIA_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: ./scripts/sign_and_notarize.sh

      - name: Build DMG
        env:
          AGLAIA_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: ./scripts/build_dmg.sh

      - name: Checksum
        run: |
          cd dist
          shasum -a 256 Aglaia-*.dmg | tee SHA256SUMS.txt

      - name: Stable-named copy (version-agnostic direct download)
        # The landing page links to
        #   releases/latest/download/Aglaia-macos-arm64.dmg
        # so "Download for macOS" always grabs the newest build without
        # threading the version through the URL. Ship it alongside the
        # versioned asset (which the Cask / formula pin by sha256).
        run: cp dist/Aglaia-*.dmg dist/Aglaia-macos-arm64.dmg

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aglaïa ${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/Aglaia-*.dmg
            dist/SHA256SUMS.txt

  build-windows:
    runs-on: windows-latest
    # Authenticode signing is OPTIONAL: set WINDOWS_CERT_PFX_BASE64 +
    # WINDOWS_CERT_PASSWORD to ship a signed exe (SmartScreen-friendly).
    # Without them an unsigned ZIP still ships.
    env:
      WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Vendor llama-server (Surya backend)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # lift anonymous API rate limit
        run: uv run --no-project python scripts/fetch_llama_server.py --platform windows-x64

      - name: Sync deps (no macos/cuda — Apple + Linux-GPU extras are off-target)
        # `gui` (PySide6) is mandatory or the frozen app can't import Qt. `surya`
        # is the cross-platform OCR engine; the apple_vision layout/OCR backend is
        # macOS-only and auto-falls back to EAST/heuristic here. `paddle` is left
        # out for now (heavy/fragile Windows wheels) — add `--extra paddle` once
        # validated; `jbig2` (Rust/maturin) likewise omitted, output falls back to
        # G4 PDF compression.
        run: >-
          uv sync --extra gui --extra voice --extra dev --extra package
          --extra cloud --extra surya

      - name: Tests (release gate)
        run: uv run pytest -q

      - name: Build .exe (PyInstaller onedir)
        env:
          AGLAIA_VERSION: ${{ steps.ver.outputs.version }}
        run: uv run pyinstaller Aglaia.spec --clean --noconfirm

      - name: Sign app exe (optional)
        if: ${{ env.WINDOWS_CERT_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          $st = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -First 1 -ExpandProperty FullName
          & $st sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 "dist\Aglaia\Aglaia.exe"
          if ($LASTEXITCODE -ne 0) { throw "signtool (exe) failed" }
          Remove-Item $pfx

      - name: Build installer (Inno Setup) — Start-menu shortcut + .agl association
        shell: pwsh
        env:
          AGLAIA_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\aglaia.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: Sign installer (optional)
        if: ${{ env.WINDOWS_CERT_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          $st = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -First 1 -ExpandProperty FullName
          & $st sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 "dist\Aglaia-windows-x64-setup.exe"
          if ($LASTEXITCODE -ne 0) { throw "signtool (installer) failed" }
          Remove-Item $pfx

      - name: Package portable ZIP
        shell: pwsh
        run: Compress-Archive -Path dist\Aglaia\* -DestinationPath dist\Aglaia-windows-x64.zip

      - name: Checksums
        shell: pwsh
        run: |
          Set-Location dist
          Get-ChildItem Aglaia-windows-x64.zip, Aglaia-windows-x64-setup.exe | ForEach-Object {
            $h = (Get-FileHash $_.Name -Algorithm SHA256).Hash.ToLower()
            "$h  $($_.Name)"
          } | Out-File -Encoding ascii SHA256SUMS-windows.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aglaïa ${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/Aglaia-windows-x64-setup.exe
            dist/Aglaia-windows-x64.zip
            dist/SHA256SUMS-windows.txt

  build-linux:
    # ubuntu-22.04 (glibc 2.35) for AppImage portability — building on a newer
    # glibc would exclude older distros from running the result.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: System libs (AppImage tooling + Qt xcb runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfuse2 libxcb-cursor0 libxkbcommon-x11-0 libegl1 libgl1 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Vendor llama-server (Surya backend)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # lift anonymous API rate limit
        run: uv run --no-project python scripts/fetch_llama_server.py --platform linux-x64

      - name: Sync deps (no macos/cuda — Apple + Linux-GPU extras are off-target)
        run: >-
          uv sync --extra gui --extra voice --extra dev --extra package
          --extra cloud --extra surya

      - name: Tests (release gate)
        env:
          QT_QPA_PLATFORM: offscreen   # no display on the runner
        run: uv run pytest -q

      - name: Build onedir (PyInstaller)
        env:
          AGLAIA_VERSION: ${{ steps.ver.outputs.version }}
        run: uv run pyinstaller Aglaia.spec --clean --noconfirm

      - name: Fetch appimagetool
        # Named plainly `appimagetool` on PATH; build_appimage.sh runs it with
        # APPIMAGE_EXTRACT_AND_RUN=1 so no FUSE mount is needed on the runner.
        run: |
          curl -fsSL -o "$RUNNER_TEMP/appimagetool" \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x "$RUNNER_TEMP/appimagetool"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Build AppImage
        env:
          AGLAIA_VERSION: ${{ steps.ver.outputs.version }}
          ARCH: x86_64
        run: ./packaging/build_appimage.sh

      - name: Checksum
        run: cd dist && sha256sum Aglaia-x86_64.AppImage | tee SHA256SUMS-linux.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aglaïa ${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/Aglaia-x86_64.AppImage
            dist/SHA256SUMS-linux.txt
