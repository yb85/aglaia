name: site

# Build + deploy the landing page and docs (site/) to Cloudflare Pages.
# Docs reference pages are generated from docs/*.md at build time, so a
# docs edit on main redeploys the site.
#
# Required secrets:
#   CLOUDFLARE_API_TOKEN   token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  your account id
# And a Cloudflare Pages project named "aglaia" (custom domain aglaia.bibli.cc).

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=aglaia --branch=main
