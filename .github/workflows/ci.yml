name: ci

# Fast test gate on every push / PR. No packaging, no secrets.
# Runs on macOS because Aglaïa's runtime hard-depends on Apple Vision +
# Speech (pyobjc) — the same constraint that makes releases macOS-only.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14   # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync deps (macOS extras)
        run: uv sync --extra macos --extra dev --extra server

      - name: Tests
        run: uv run pytest -q
